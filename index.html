<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-[420px]">

<h1 class="text-2xl font-bold text-center mb-4">💰 Goal Tracker</h1>

<div class="flex gap-2 mb-4">
<input id="goalInput" type="number" placeholder="Set new goal" class="border p-2 rounded w-full">
<button onclick="resetGoal()" class="bg-yellow-500 text-white px-3 rounded">🎯 Set Goal</button>
</div>

<div class="mb-4">
<div class="flex justify-between mb-1">
<span class="font-semibold">Progress</span>
<span id="progressText"></span>
</div>
<div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
<div id="progressBar" class="bg-green-500 h-4 rounded-full"></div>
</div>
</div>

<div class="flex gap-2 mb-4">
<input id="amountInput" type="number" placeholder="Enter amount" class="border p-2 rounded w-full">
<button onclick="addMoney()" class="bg-green-500 text-white px-3 rounded">➕</button>
<button onclick="deductMoney()" class="bg-red-500 text-white px-3 rounded">➖</button>
</div>

<div class="flex gap-2 mb-4">
<button onclick="resetData()" class="bg-blue-500 text-white px-3 py-2 rounded w-full">🔄 Reset Data</button>
<button onclick="downloadPDF()" class="bg-purple-500 text-white px-3 py-2 rounded w-full">📄 Download PDF</button>
</div>

<table class="w-full text-sm text-left">
<thead>
<tr class="border-b">
<th class="py-2">📅 Date</th>
<th class="py-2">💵 Change</th>
<th class="py-2">📊 Total</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
let goal = parseFloat(localStorage.getItem('goal')) || 215;

let data = JSON.parse(localStorage.getItem('trackerData')) || {
 total: 20,
 history: []
};

function saveData() {
 localStorage.setItem('trackerData', JSON.stringify(data));
 localStorage.setItem('goal', goal);
}

function updateUI() {
 let percent = Math.max(0, Math.min(100, (data.total / goal) * 100));
 document.getElementById('progressBar').style.width = percent + '%';
 document.getElementById('progressText').innerText = `$${data.total} / $${goal}`;
}

function renderTable() {
 let table = document.getElementById('tableBody');
 table.innerHTML = '';

 data.history.forEach(entry => {
  let row = document.createElement('tr');
  row.classList.add('border-b');

  row.innerHTML = `
  <td class="py-2">${entry.date}</td>
  <td class="py-2 ${entry.amount < 0 ? 'text-red-500' : 'text-green-600'}">${entry.amount < 0 ? '-' : '+'}$${Math.abs(entry.amount)}</td>
  <td class="py-2">$${entry.total}</td>
  `;

  table.appendChild(row);
 });
}

function addMoney() {
 let input = document.getElementById('amountInput');
 let amount = parseFloat(input.value);
 if (!amount || amount <= 0) return;

 data.total += amount;

 let entry = {
  date: new Date().toLocaleDateString(),
  amount: amount,
  total: data.total
 };

 data.history.push(entry);
 saveData();
 updateUI();
 renderTable();
 input.value = '';
}

function deductMoney() {
 let input = document.getElementById('amountInput');
 let amount = parseFloat(input.value);
 if (!amount || amount <= 0) return;

 data.total -= amount;

 let entry = {
  date: new Date().toLocaleDateString(),
  amount: -amount,
  total: data.total
 };

 data.history.push(entry);
 saveData();
 updateUI();
 renderTable();
 input.value = '';
}

function resetData() {
 data = { total: 20, history: [] };
 saveData();
 updateUI();
 renderTable();
}

function resetGoal() {
 let input = document.getElementById('goalInput');
 let newGoal = parseFloat(input.value);
 if (!newGoal || newGoal <= 0) return;

 goal = newGoal;
 saveData();
 updateUI();
 input.value = '';
}

function downloadPDF() {
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 doc.setFontSize(16);
 doc.text("Money Tracker Report", 20, 20);

 doc.setFontSize(12);
 doc.text(`Total: $${data.total} / $${goal}`, 20, 30);

 let y = 40;
 data.history.forEach((entry, index) => {
  doc.text(`${index + 1}. ${entry.date} | ${entry.amount > 0 ? '+' : ''}${entry.amount} | Total: ${entry.total}`, 20, y);
  y += 8;
 });

 doc.save("tracker_report.pdf");
}

updateUI();
renderTable();
</script>

</body>
</html>
