<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-[440px]">

<h1 class="text-2xl font-bold text-center mb-4">💰 Goal Tracker</h1>

<div class="flex gap-2 mb-4">
<select id="currencySelect" class="border p-2 rounded w-full">
<option value="$">USD ($)</option>
<option value="₹">INR (₹)</option>
<option value="€">EUR (€)</option>
<option value="£">GBP (£)</option>
<option value="BTC">BTC</option>
<option value="ETH">ETH</option>
</select>
</div>

<div class="flex gap-2 mb-4">
<input id="goalInput" type="number" placeholder="Set new goal" class="border p-2 rounded w-full">
<button onclick="resetGoal()" class="bg-yellow-500 text-white px-3 rounded">🎯 Set Goal</button>
</div>

<div class="mb-4">
<div class="flex justify-between mb-1">
<span class="font-semibold">Progress</span>
<span id="progressText"></span>
</div>
<div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
<div id="progressBar" class="bg-green-500 h-4 rounded-full"></div>
</div>
</div>

<div class="flex gap-2 mb-4">
<input id="amountInput" type="number" placeholder="Enter amount" class="border p-2 rounded w-full">
<button onclick="addMoney()" class="bg-green-500 text-white px-3 rounded">➕</button>
<button onclick="deductMoney()" class="bg-red-500 text-white px-3 rounded">➖</button>
</div>

<div class="flex gap-2 mb-4">
<button onclick="resetData()" class="bg-blue-500 text-white px-3 py-2 rounded w-full">🔄 Reset</button>
<button onclick="downloadPDF()" class="bg-purple-500 text-white px-3 py-2 rounded w-full">📄 PDF</button>
</div>

<div class="flex gap-2 mb-4">
<input id="saveName" type="text" placeholder="Save name" class="border p-2 rounded w-full">
<button onclick="saveTracker()" class="bg-black text-white px-3 rounded">💾 Save</button>
</div>

<div class="mb-4">
<h2 class="font-semibold mb-2">📂 Saved Data</h2>
<ul id="savedList" class="space-y-2"></ul>
</div>

<table class="w-full text-sm text-left">
<thead>
<tr class="border-b">
<th class="py-2">📅 Date & Time</th>
<th class="py-2">💵 Change</th>
<th class="py-2">📊 Total</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
let goal = 0;
let currency = '$';
let data = { total: 0, history: [] };
let currentIndex = null;

let savedTrackers = JSON.parse(localStorage.getItem('savedTrackers')) || [];

function persistSaved(){
 localStorage.setItem('savedTrackers', JSON.stringify(savedTrackers));
}

function saveData() {
 localStorage.setItem('trackerData', JSON.stringify(data));
 localStorage.setItem('goal', goal);
 localStorage.setItem('currency', currency);
 if(currentIndex !== null){
  savedTrackers[currentIndex] = {
   name: savedTrackers[currentIndex].name,
   data: JSON.parse(JSON.stringify(data)),
   goal,
   currency
  };
  persistSaved();
 }
}

function updateUI() {
 let percent = goal > 0 ? Math.min(100, (data.total / goal) * 100) : 0;
 document.getElementById('progressBar').style.width = percent + '%';
 document.getElementById('progressText').innerText = `${currency}${data.total} / ${currency}${goal}`;
}

function renderTable() {
 let table = document.getElementById('tableBody');
 table.innerHTML = '';
 data.history.forEach(entry => {
  let row = document.createElement('tr');
  row.innerHTML = `
  <td class="py-2">${entry.datetime}</td>
  <td class="py-2 ${entry.amount < 0 ? 'text-red-500' : 'text-green-600'}">${entry.amount < 0 ? '-' : '+'}${currency}${Math.abs(entry.amount)}</td>
  <td class="py-2">${currency}${entry.total}</td>
  `;
  table.appendChild(row);
 });
}

function renderSaved() {
 let list = document.getElementById('savedList');
 list.innerHTML = '';
 savedTrackers.forEach((item, index) => {
  let li = document.createElement('li');
  li.className = 'flex justify-between bg-gray-100 p-2 rounded';
  li.innerHTML = `
  <span>${item.name}</span>
  <div class="flex gap-2">
  <button onclick="loadTracker(${index})" class="bg-green-500 text-white px-2 rounded">Open</button>
  <button onclick="deleteTracker(${index})" class="bg-red-500 text-white px-2 rounded">X</button>
  </div>
  `;
  list.appendChild(li);
 });
}

function getDateTime() {
 return new Date().toLocaleString();
}

function addMoney() {
 let amount = parseFloat(document.getElementById('amountInput').value);
 if (!amount || amount <= 0) return;
 data.total += amount;
 data.history.push({ datetime: getDateTime(), amount: amount, total: data.total });
 saveData(); updateUI(); renderTable();
 document.getElementById('amountInput').value = '';
}

function deductMoney() {
 let amount = parseFloat(document.getElementById('amountInput').value);
 if (!amount || amount <= 0) return;
 data.total -= amount;
 data.history.push({ datetime: getDateTime(), amount: -amount, total: data.total });
 saveData(); updateUI(); renderTable();
 document.getElementById('amountInput').value = '';
}

function resetData() {
 data = { total: 0, history: [] };
 saveData(); updateUI(); renderTable();
}

function resetGoal() {
 let newGoal = parseFloat(document.getElementById('goalInput').value);
 if (!newGoal || newGoal <= 0) return;
 goal = newGoal;
 saveData(); updateUI();
 document.getElementById('goalInput').value = '';
}

function saveTracker() {
 let name = document.getElementById('saveName').value;
 if (!name) return;
 savedTrackers.push({
  name,
  data: JSON.parse(JSON.stringify(data)),
  goal,
  currency
 });
 persistSaved();
 renderSaved();
 document.getElementById('saveName').value = '';
}

function loadTracker(index) {
 let item = savedTrackers[index];
 currentIndex = index;
 data = JSON.parse(JSON.stringify(item.data));
 goal = item.goal;
 currency = item.currency;
 saveData();
 updateUI(); renderTable();
}

function deleteTracker(index) {
 savedTrackers.splice(index, 1);
 persistSaved();
 if(currentIndex === index) currentIndex = null;
 renderSaved();
}

function downloadPDF() {
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();
 doc.text(`Total: ${currency}${data.total} / ${currency}${goal}`, 20, 20);
 let y = 30;
 data.history.forEach((e,i)=>{
  doc.text(`${i+1}. ${e.datetime} | ${e.amount} | ${e.total}`,20,y);
  y+=8;
 });
 doc.save('tracker.pdf');
}

function init(){
 let saved = localStorage.getItem('trackerData');
 if(saved){data = JSON.parse(saved)}
 goal = parseFloat(localStorage.getItem('goal'))||0;
 currency = localStorage.getItem('currency')||'$';
 document.getElementById('currencySelect').value = currency;
 document.getElementById('currencySelect').onchange=e=>{currency=e.target.value;saveData();updateUI();renderTable();};
 updateUI(); renderTable(); renderSaved();
}

init();
</script>

</body>
</html>
